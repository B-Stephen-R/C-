<!DOCTYPE html>
<html lang="en">
<head>
    <title>Desales Cost Calculator</title>
    <link href="./style.css" rel="stylesheet" type="text/css">
</head>

<body>

    <div class="header">
        <img class="inLine" src="./DeSales Logo.webp" alt="Desales Logo" width=20%>
        <h1 class="inLine">Calculate Your Ed-Choice Scholarship</h1>
        <img class="inLine" src="./DeSales Logo.webp" alt="Desales Logo" width=20%>
    </div>

    <div class="main">
        <h2>Enter Your Information</h2>
        <form action="./results.html" method="get">
            <label for="income">Household Income:</label><br>
            <input type="number" id="income" name="income" required><br><br>

            <label for="students">Number of Students in Household:</label><br>
            <input type="number" id="students" name="students" required><br><br>

            <input type="submit" value="Calculate Scholarship">
        </form>










    </div>



</body>
